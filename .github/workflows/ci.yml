name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # cogno-synapse is a type-only dep of the lib, but the integration tests
          # exercise the real OllamaEmbedder path, so install it (+ its own dep
          # cogno-homeo) from git — neither is on PyPI yet. Without it the
          # integration module importorskips to zero collected tests and pytest
          # exits 5 ("no tests collected"), failing the step.
          pip install "cogno-homeo @ git+https://github.com/sudoers-ai/cogno-homeo.git"
          pip install "cogno-synapse @ git+https://github.com/sudoers-ai/cogno-synapse.git"
      - name: Lint (ruff)
        run: ruff check cogno_persona cognobench tests examples
      - name: Type-check (mypy)
        run: mypy cogno_persona
      - name: Unit tests
        run: pytest tests/unit -q --cov=cogno_persona --cov-report=term-missing --cov-fail-under=90
      - name: Routing bench smoke (deterministic, no network)
        run: python cognobench.py --stub --min-score 100
      - name: Integration tests (auto-skip without Ollama / cogno-synapse)
        # These need a live Ollama (absent in CI), so they skip. When the whole
        # module skips at importorskip, pytest collects zero tests and exits 5
        # ("no tests collected") — tolerate that; fail on any other non-zero.
        run: pytest tests/integration -q || [ $? -eq 5 ]
